<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Energy Comparison</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0EvHe/X+R7Yk0jk4dD+4oYajFd9KYpX+1SRwdeZxDgUZZOfKxJZxwIN9tC54sczE" crossorigin="anonymous">
</head>
<body class="container my-5">
  <h1 class="mb-4">Energy Comparison</h1>
  <form method="post" class="row g-3">
    <div class="col-12">
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="energy_type" value="Electricity" checked>
        <label class="form-check-label">Electricity</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="energy_type" value="Gas">
        <label class="form-check-label">Gas</label>
      </div>
    </div>
    <div class="col-md-6">
      <label class="form-label">Postal Code
        <input class="form-control" type="text" name="postal_code" required>
      </label>
    </div>
    <div class="col-md-6">
      <label class="form-label">Annual Consumption (kWh)
        <input class="form-control" type="number" name="consumption" step="0.01" required>
      </label>
    </div>
    <div class="col-12">
      <button class="btn btn-primary" type="submit">Compare</button>
    </div>
  </form>
  {% if results %}
  <table class="table mt-4">
    <thead>
      <tr>
        <th>Supplier</th>
        <th>Arbeitspreis (€/kWh)</th>
        <th>Grundpreis (€)</th>
        <th>Total Monthly (€)</th>
      </tr>
    </thead>
    <tbody>
      {% for r in results %}
      <tr>
        <td>{{ r.name }}</td>
        <td>{{ '%.3f' % r.arbeitspreis }}</td>
        <td>{{ '%.2f' % r.grundpreis }}</td>
        <td>{{ '%.2f' % r.total }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% endif %}
</body>
</html>
